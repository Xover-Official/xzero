<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; }
        #ui { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px 15px; border-radius: 8px; font-family: monospace; font-size: 12px; line-height: 1.8; }
        #controls kbd { background: #333; padding: 2px 6px; border-radius: 3px; border: 1px solid #555; }
        #info { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px 15px; border-radius: 8px; font-family: monospace; font-size: 13px; }
        #info .title { color: #ffb7c5; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="info">
            <div class="title">🌸 Sakura Academy</div>
            <div id="coords">Position: 0, 0</div>
        </div>
        <div id="controls">
            <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move</div>
            <div><kbd>Shift</kbd> Run</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// SEEDED RANDOM
// ============================================================
function seededRandom(seed) {
    let s = seed;
    return function() {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
    };
}

// ============================================================
// PIXEL ART DRAWING HELPERS
// ============================================================
function p(ctx, x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// ============================================================
// DRAW FUNCTIONS (Direct pixel art rendering)
// ============================================================

function drawGrassTile(ctx, x, y, size, seed) {
    const rng = seededRandom(seed);
    const colors = ['#4a7c59', '#3d6b4e', '#5a8f6a', '#4d7a5c'];
    p(ctx, x, y, size, size, colors[Math.floor(rng() * colors.length)]);
    
    // Grass blades
    p(ctx, x + 4, y + 8, 2, 4, 'rgba(0,0,0,0.1)');
    p(ctx, x + 12, y + 20, 2, 3, 'rgba(0,0,0,0.1)');
    p(ctx, x + 24, y + 12, 2, 4, 'rgba(0,0,0,0.1)');
}

function drawPathTile(ctx, x, y, size, seed) {
    const rng = seededRandom(seed);
    p(ctx, x, y, size, size, '#c4a882');
    
    // Path texture
    for (let i = 0; i < 5; i++) {
        p(ctx, x + rng() * size, y + rng() * size, 3, 2, '#b89872');
    }
}

function drawStoneTile(ctx, x, y, size, seed) {
    const rng = seededRandom(seed);
    p(ctx, x, y, size, size, '#888');
    
    for (let i = 0; i < 4; i++) {
        p(ctx, x + rng() * size, y + rng() * size, 4, 3, '#777');
    }
}

function drawWaterTile(ctx, x, y, size, seed, time) {
    p(ctx, x, y, size, size, '#4a90d9');
    
    // Animated ripples
    const offset = Math.sin(time * 0.05 + seed) * 3;
    p(ctx, x + 4 + offset, y + 8, 10, 2, 'rgba(255,255,255,0.4)');
    p(ctx, x + 14 - offset, y + 20, 8, 2, 'rgba(255,255,255,0.3)');
}

function drawBridgeTile(ctx, x, y, size) {
    p(ctx, x, y, size, size, '#8b6914');
    
    // Wood planks
    p(ctx, x, y + 4, size, 2, 'rgba(0,0,0,0.15)');
    p(ctx, x, y + 12, size, 2, 'rgba(0,0,0,0.15)');
    p(ctx, x, y + 20, size, 2, 'rgba(0,0,0,0.15)');
    
    // Railings
    p(ctx, x + 2, y, 2, size, '#666');
    p(ctx, x + size - 4, y, 2, size, '#666');
}

function drawCherryTree(ctx, x, y, size, seed) {
    const rng = seededRandom(seed);
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(x + size/2 + 4, y + size - 2, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Trunk
    p(ctx, x + 12, y + 16, 8, 16, '#5c3a1e');
    p(ctx, x + 13, y + 18, 3, 12, '#4a2e18');
    
    // Branches
    p(ctx, x + 8, y + 14, 6, 3, '#5c3a1e');
    p(ctx, x + 18, y + 12, 6, 3, '#5c3a1e');
    
    // Foliage layers (cherry blossom)
    const colors = ['#ffb7c5', '#ff9eb5', '#ff85a2', '#ffc0cb'];
    
    // Bottom layer
    p(ctx, x + 2, y + 6, 28, 14, colors[2]);
    ctx.fillStyle = colors[2];
    ctx.beginPath();
    ctx.moveTo(x + 16, y);
    ctx.lineTo(x + 2, y + 16);
    ctx.lineTo(x + 30, y + 16);
    ctx.fill();
    
    // Middle layer
    ctx.fillStyle = colors[1];
    ctx.beginPath();
    ctx.moveTo(x + 16, y + 4);
    ctx.lineTo(x + 6, y + 18);
    ctx.lineTo(x + 26, y + 18);
    ctx.fill();
    
    // Top layer
    ctx.fillStyle = colors[0];
    ctx.beginPath();
    ctx.moveTo(x + 16, y + 8);
    ctx.lineTo(x + 10, y + 20);
    ctx.lineTo(x + 22, y + 20);
    ctx.fill();
    
    // Highlights
    p(ctx, x + 12, y + 6, 4, 2, 'rgba(255,255,255,0.5)');
    p(ctx, x + 8, y + 12, 3, 2, 'rgba(255,255,255,0.3)');
    
    // Falling petals
    for (let i = 0; i < 3; i++) {
        const px = x + 4 + ((seed * 7 + i * 13) % 24);
        const py = y + 8 + ((seed * 11 + i * 17) % 16);
        p(ctx, px, py, 2, 2, '#ffb7c5');
    }
}

function drawGreenTree(ctx, x, y, size, seed) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(x + size/2 + 4, y + size - 2, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Trunk
    p(ctx, x + 12, y + 16, 8, 16, '#5c3a1e');
    p(ctx, x + 13, y + 18, 3, 12, '#4a2e18');
    
    // Foliage
    const colors = ['#2d5a27', '#3a7a32', '#4a8a42'];
    
    ctx.fillStyle = colors[2];
    ctx.beginPath();
    ctx.moveTo(x + 16, y);
    ctx.lineTo(x + 2, y + 16);
    ctx.lineTo(x + 30, y + 16);
    ctx.fill();
    
    ctx.fillStyle = colors[1];
    ctx.beginPath();
    ctx.moveTo(x + 16, y + 4);
    ctx.lineTo(x + 6, y + 18);
    ctx.lineTo(x + 26, y + 18);
    ctx.fill();
    
    ctx.fillStyle = colors[0];
    ctx.beginPath();
    ctx.moveTo(x + 16, y + 8);
    ctx.lineTo(x + 10, y + 20);
    ctx.lineTo(x + 22, y + 20);
    ctx.fill();
    
    // Highlight
    p(ctx, x + 12, y + 6, 4, 2, 'rgba(255,255,255,0.2)');
}

function drawBuilding(ctx, x, y, w, h, seed) {
    const rng = seededRandom(seed);
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x + 6, y + 6, w, h);
    
    // Wall
    p(ctx, x, y, w, h, '#f5f0e8');
    
    // Wall texture
    p(ctx, x + 2, y + 2, w - 4, h - 4, 'rgba(0,0,0,0.02)');
    
    // Roof
    ctx.fillStyle = '#4a4a4a';
    ctx.beginPath();
    ctx.moveTo(x - 4, y);
    ctx.lineTo(x + w/2, y - 16);
    ctx.lineTo(x + w + 4, y);
    ctx.fill();
    
    // Roof shadow
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.moveTo(x + w/2, y - 16);
    ctx.lineTo(x + w + 4, y);
    ctx.lineTo(x + w/2, y);
    ctx.fill();
    
    // Windows
    const winW = 14, winH = 16;
    const cols = Math.floor((w - 24) / 22);
    const rows = Math.floor((h - 32) / 26);
    
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const wx = x + 14 + c * 22;
            const wy = y + 18 + r * 26;
            
            // Frame
            p(ctx, wx - 1, wy - 1, winW + 2, winH + 2, '#3a3a3a');
            
            // Glass
            p(ctx, wx, wy, winW, winH, '#87ceeb');
            
            // Reflection
            p(ctx, wx + 1, wy + 1, 5, 5, 'rgba(255,255,255,0.5)');
            
            // Cross
            p(ctx, wx + 6, wy, 2, winH, '#3a3a3a');
            p(ctx, wx, wy + 7, winW, 2, '#3a3a3a');
        }
    }
    
    // Door
    const doorX = x + Math.floor(w/2) - 10;
    const doorY = y + h - 28;
    
    p(ctx, doorX, doorY, 20, 28, '#5c3a1e');
    p(ctx, doorX - 1, doorY - 1, 22, 2, '#4a2e18');
    p(ctx, doorX - 1, doorY, 2, 28, '#4a2e18');
    p(ctx, doorX + 19, doorY, 2, 28, '#4a2e18');
    
    // Door window
    p(ctx, doorX + 4, doorY + 4, 12, 10, '#87ceeb');
    p(ctx, doorX + 5, doorY + 5, 4, 4, 'rgba(255,255,255,0.4)');
    
    // Handle
    p(ctx, doorX + 15, doorY + 18, 3, 5, '#c0c0c0');
}

function drawCharacter(ctx, x, y, frame, direction, hairColor, shirtColor, scale = 1) {
    const s = scale;
    const bobY = Math.floor(Math.sin(frame * 0.3) * 1);
    const legOff = Math.floor(Math.sin(frame * 0.5) * 2);
    const armSwing = Math.floor(Math.sin(frame * 0.5) * 2);
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + 20 * s, 6 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Legs
    p(ctx, x - 3 * s, y + 12 * s + legOff * s, 3 * s, 6 * s, '#2c3e50');
    p(ctx, x + 1 * s, y + 12 * s - legOff * s, 3 * s, 6 * s, '#2c3e50');
    
    // Shoes
    p(ctx, x - 3 * s, y + 17 * s + legOff * s, 3 * s, 2 * s, '#1a1a1a');
    p(ctx, x + 1 * s, y + 17 * s - legOff * s, 3 * s, 2 * s, '#1a1a1a');
    
    // Body
    p(ctx, x - 4 * s, y + 6 * s, 9 * s, 8 * s, shirtColor);
    
    // Arms
    p(ctx, x - 6 * s, y + 7 * s + armSwing * s, 3 * s, 6 * s, shirtColor);
    p(ctx, x + 4 * s, y + 7 * s - armSwing * s, 3 * s, 6 * s, shirtColor);
    
    // Hands
    p(ctx, x - 6 * s, y + 12 * s + armSwing * s, 3 * s, 2 * s, '#f5d0a0');
    p(ctx, x + 4 * s, y + 12 * s - armSwing * s, 3 * s, 2 * s, '#f5d0a0');
    
    // Head
    p(ctx, x - 3 * s, y + bobY * s, 7 * s, 7 * s, '#f5d0a0');
    
    // Hair
    p(ctx, x - 4 * s, y - 2 * s + bobY * s, 9 * s, 5 * s, hairColor);
    p(ctx, x - 4 * s, y + bobY * s, 2 * s, 5 * s, hairColor);
    p(ctx, x + 3 * s, y + bobY * s, 2 * s, 5 * s, hairColor);
    
    // Hair highlight
    p(ctx, x - 1 * s, y - 1 * s + bobY * s, 4 * s, 1 * s, 'rgba(255,255,255,0.3)');
    
    // Eyes
    p(ctx, x - 1 * s, y + 3 * s + bobY * s, 1 * s, 1 * s, '#1a1a1a');
    p(ctx, x + 2 * s, y + 3 * s + bobY * s, 1 * s, 1 * s, '#1a1a1a');
    
    // Mouth
    p(ctx, x, y + 5 * s + bobY * s, 2 * s, 1 * s, '#d4846a');
}

function drawNPC(ctx, x, y, frame, direction, hairColor, shirtColor, name) {
    drawCharacter(ctx, x, y, frame, direction, hairColor, shirtColor, 1);
    
    // Name tag
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(name).width;
    ctx.fillRect(x - tw/2 - 5, y - 28, tw + 10, 16);
    ctx.fillStyle = '#fff';
    ctx.fillText(name, x, y - 17);
}

function drawVendingMachine(ctx, x, y) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x + 2, y + 22, 14, 3);
    
    // Body
    p(ctx, x, y, 18, 24, '#4488ff');
    
    // Display
    p(ctx, x + 2, y + 2, 14, 16, '#222');
    
    // Drinks
    const drinks = ['#ff4444', '#44ff44', '#ffaa44', '#ff44aa', '#44aaff'];
    for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
            p(ctx, x + 3 + c * 3, y + 3 + r * 4, 2, 3, drinks[(r + c) % drinks.length]);
        }
    }
    
    // Buttons
    p(ctx, x + 2, y + 20, 4, 2, '#ff4444');
    p(ctx, x + 7, y + 20, 4, 2, '#44ff44');
    p(ctx, x + 12, y + 20, 4, 2, '#ffaa44');
    
    // Coin slot
    p(ctx, x + 6, y + 22, 4, 2, '#c0c0c0');
}

function drawLantern(ctx, x, y, time) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 6, y + 18, 5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Post
    p(ctx, x + 5, y + 8, 2, 12, '#333');
    
    // Lantern body
    p(ctx, x + 2, y + 2, 8, 8, '#ff4444');
    
    // Top/bottom
    p(ctx, x + 2, y + 1, 8, 1, '#333');
    p(ctx, x + 2, y + 10, 8, 1, '#333');
    
    // Glow
    const glowIntensity = 0.3 + Math.sin(time * 0.02) * 0.1;
    ctx.fillStyle = `rgba(255, 200, 100, ${glowIntensity})`;
    ctx.beginPath();
    ctx.arc(x + 6, y + 6, 10, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner light
    p(ctx, x + 4, y + 4, 4, 4, '#ffcc66');
}

function drawBench(ctx, x, y) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x + 2, y + 10, 18, 2);
    
    // Seat
    p(ctx, x + 2, y + 6, 18, 3, '#8b6914');
    p(ctx, x + 2, y + 7, 18, 1, 'rgba(0,0,0,0.1)');
    
    // Legs
    p(ctx, x + 3, y + 9, 2, 3, '#666');
    p(ctx, x + 17, y + 9, 2, 3, '#666');
    
    // Back
    p(ctx, x + 2, y + 2, 18, 3, '#8b6914');
    
    // Supports
    p(ctx, x + 3, y + 5, 2, 2, '#666');
    p(ctx, x + 17, y + 5, 2, 2, '#666');
}

function drawFence(ctx, x, y) {
    // Posts
    p(ctx, x + 2, y + 2, 2, 10, '#f5f5f5');
    p(ctx, x + 14, y + 2, 2, 10, '#f5f5f5');
    
    // Rails
    p(ctx, x + 4, y + 3, 10, 2, '#e8e8e8');
    p(ctx, x + 4, y + 7, 10, 2, '#e8e8e8');
    
    // Tops
    p(ctx, x + 1, y + 1, 4, 2, '#ddd');
    p(ctx, x + 13, y + 1, 4, 2, '#ddd');
}

function drawFlower(ctx, x, y, seed) {
    const rng = seededRandom(seed);
    const colors = ['#ff6b8a', '#ffaa44', '#ff44aa', '#ffdd44', '#aa66ff'];
    const color = colors[Math.floor(rng() * colors.length)];
    
    // Stem
    p(ctx, x - 1, y, 2, 6, '#3a7a32');
    
    // Petals
    for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x + Math.cos(angle) * 3, y - 2 + Math.sin(angle) * 3, 2, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Center
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(x, y - 2, 2, 0, Math.PI * 2);
    ctx.fill();
}

// ============================================================
// TILE TYPES
// ============================================================
const TILE = {
    GRASS: 0, PATH: 1, STONE: 2, BUILDING: 3,
    CHERRY_TREE: 4, GREEN_TREE: 5, WATER: 6,
    FENCE: 7, VENDING: 8, LANTERN: 9, BENCH: 10, FLOWER: 11, BRIDGE: 12
};

const TILE_SIZE = 32;

// ============================================================
// MAP GENERATION
// ============================================================
function generateMap(width, height, seed) {
    const rng = seededRandom(seed);
    const map = [];
    
    for (let y = 0; y < height; y++) {
        map[y] = [];
        for (let x = 0; x < width; x++) {
            map[y][x] = TILE.GRASS;
        }
    }
    
    const midX = Math.floor(width / 2);
    const midY = Math.floor(height / 2);
    
    // Paths
    for (let x = 0; x < width; x++) {
        map[midY][x] = TILE.PATH;
        map[midY + 1][x] = TILE.PATH;
    }
    for (let y = 0; y < height; y++) {
        map[y][midX] = TILE.PATH;
        map[y][midX + 1] = TILE.PATH;
    }
    
    // Stone walkways
    for (let x = 2; x < width - 2; x++) {
        if (map[midY - 2]?.[x] === TILE.GRASS && rng() > 0.7) map[midY - 2][x] = TILE.STONE;
        if (map[midY + 3]?.[x] === TILE.GRASS && rng() > 0.7) map[midY + 3][x] = TILE.STONE;
    }
    
    // Buildings
    const buildings = [
        { x: 2, y: 2, w: 6, h: 4 },
        { x: midX + 4, y: 2, w: 5, h: 5 },
        { x: 2, y: midY + 4, w: 7, h: 4 },
        { x: midX + 3, y: midY + 3, w: 6, h: 5 },
        { x: Math.floor(width * 0.75), y: Math.floor(height * 0.25), w: 4, h: 3 }
    ];
    
    for (const b of buildings) {
        for (let by = b.y; by < b.y + b.h && by < height; by++) {
            for (let bx = b.x; bx < b.x + b.w && bx < width; bx++) {
                map[by][bx] = TILE.BUILDING;
            }
        }
    }
    
    // Trees
    for (let i = 0; i < 15; i++) {
        const tx = Math.floor(rng() * width);
        const ty = Math.floor(rng() * height);
        if (map[ty][tx] === TILE.GRASS) map[ty][tx] = TILE.CHERRY_TREE;
    }
    
    for (let i = 0; i < 10; i++) {
        const tx = Math.floor(rng() * width);
        const ty = Math.floor(rng() * height);
        if (map[ty][tx] === TILE.GRASS) map[ty][tx] = TILE.GREEN_TREE;
    }
    
    // Flowers
    for (let i = 0; i < 25; i++) {
        const fx = Math.floor(rng() * width);
        const fy = Math.floor(rng() * height);
        if (map[fy][fx] === TILE.GRASS) map[fy][fx] = TILE.FLOWER;
    }
    
    // Fences
    for (let x = 0; x < width; x += 3) {
        if (map[midY - 1]?.[x] === TILE.GRASS) map[midY - 1][x] = TILE.FENCE;
        if (map[midY + 2]?.[x] === TILE.GRASS) map[midY + 2][x] = TILE.FENCE;
    }
    
    // Lanterns
    for (let x = 0; x < width; x += 5) {
        if (map[midY - 1]?.[x] === TILE.GRASS) map[midY - 1][x] = TILE.LANTERN;
    }
    
    // Benches
    for (let i = 0; i < 6; i++) {
        const bx = Math.floor(rng() * width);
        const by = Math.floor(rng() * height);
        if (map[by][bx] === TILE.GRASS) map[by][bx] = TILE.BENCH;
    }
    
    // Vending machines
    if (midY < height) map[midY][3] = TILE.VENDING;
    if (midY < height && midX + 5 < width) map[midY][midX + 5] = TILE.VENDING;
    
    // Water
    for (let x = 8; x < 12; x++) {
        for (let y = 8; y < 11; y++) {
            if (map[y]?.[x] === TILE.GRASS) map[y][x] = TILE.WATER;
        }
    }
    if (map[9]?.[10] === TILE.WATER) map[9][10] = TILE.BRIDGE;
    
    return { map, buildings };
}

// ============================================================
// GAME STATE
// ============================================================
const game = {
    player: { x: 0, y: 0, dir: 'down', frame: 0, moving: false, speed: 2.5 },
    camera: { x: 0, y: 0 },
    map: null,
    mapWidth: 50,
    mapHeight: 40,
    buildings: [],
    npcs: [],
    time: 0,
    keys: {},
    seed: 42
};

// ============================================================
// INIT
// ============================================================
function initGame() {
    const result = generateMap(game.mapWidth, game.mapHeight, game.seed);
    game.map = result.map;
    game.buildings = result.buildings;
    
    game.player.x = Math.floor(game.mapWidth / 2) * TILE_SIZE;
    game.player.y = Math.floor(game.mapHeight / 2) * TILE_SIZE;
    
    // NPCs
    const npcData = [
        { hair: '#2a1a0a', shirt: '#ff4444', name: 'Yuki' },
        { hair: '#ff6b6b', shirt: '#44bb88', name: 'Haruto' },
        { hair: '#1a1a1a', shirt: '#ffaa44', name: 'Sakura' },
        { hair: '#8b4513', shirt: '#aa66ff', name: 'Ren' },
        { hair: '#4a3728', shirt: '#66aaff', name: 'Aoi' }
    ];
    
    for (let i = 0; i < 5; i++) {
        const rng = seededRandom(game.seed + i * 100);
        let nx, ny;
        do {
            nx = Math.floor(rng() * game.mapWidth);
            ny = Math.floor(rng() * game.mapHeight);
        } while (game.map[ny]?.[nx] !== TILE.PATH && game.map[ny]?.[nx] !== TILE.GRASS && game.map[ny]?.[nx] !== TILE.STONE);
        
        game.npcs.push({
            x: nx * TILE_SIZE, y: ny * TILE_SIZE,
            ...npcData[i],
            frame: Math.floor(rng() * 100),
            dir: ['up', 'down', 'left', 'right'][Math.floor(rng() * 4)],
            moveTimer: 0,
            moveInterval: 80 + Math.floor(rng() * 120)
        });
    }
}

// ============================================================
// INPUT
// ============================================================
window.addEventListener('keydown', e => game.keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => game.keys[e.key.toLowerCase()] = false);

// ============================================================
// UPDATE
// ============================================================
function update() {
    const p = game.player;
    let dx = 0, dy = 0;
    
    const speed = game.keys['shift'] ? p.speed * 1.8 : p.speed;
    
    if (game.keys['w'] || game.keys['arrowup']) { dy = -1; p.dir = 'up'; }
    if (game.keys['s'] || game.keys['arrowdown']) { dy = 1; p.dir = 'down'; }
    if (game.keys['a'] || game.keys['arrowleft']) { dx = -1; p.dir = 'left'; }
    if (game.keys['d'] || game.keys['arrowright']) { dx = 1; p.dir = 'right'; }
    
    if (dx !== 0 || dy !== 0) {
        p.moving = true;
        p.frame += game.keys['shift'] ? 0.25 : 0.15;
        
        const newX = p.x + dx * speed;
        const newY = p.y + dy * speed;
        
        const tileX = Math.floor(newX / TILE_SIZE);
        const tileY = Math.floor(newY / TILE_SIZE);
        
        if (tileX >= 0 && tileX < game.mapWidth && tileY >= 0 && tileY < game.mapHeight) {
            const tile = game.map[tileY][tileX];
            if (tile !== TILE.BUILDING && tile !== TILE.CHERRY_TREE && tile !== TILE.GREEN_TREE && tile !== TILE.VENDING) {
                p.x = newX;
                p.y = newY;
            }
        }
    } else {
        p.moving = false;
    }
    
    // NPCs
    for (const npc of game.npcs) {
        npc.frame += 0.1;
        npc.moveTimer++;
        
        if (npc.moveTimer >= npc.moveInterval) {
            npc.moveTimer = 0;
            const rng = seededRandom(Math.floor(game.time / 60) * 1000 + npc.x);
            const moveX = Math.floor((rng() - 0.5) * 2);
            const moveY = Math.floor((rng() - 0.5) * 2);
            
            const newTileX = Math.floor((npc.x + moveX * 16) / TILE_SIZE);
            const newTileY = Math.floor((npc.y + moveY * 16) / TILE_SIZE);
            
            if (newTileX >= 0 && newTileX < game.mapWidth && newTileY >= 0 && newTileY < game.mapHeight) {
                const tile = game.map[newTileY][newTileX];
                if (tile !== TILE.BUILDING && tile !== TILE.CHERRY_TREE && tile !== TILE.GREEN_TREE) {
                    npc.x += moveX * 16;
                    npc.y += moveY * 16;
                }
            }
        }
    }
    
    // Camera
    game.camera.x = p.x - canvas.width / 2;
    game.camera.y = p.y - canvas.height / 2;
    
    document.getElementById('coords').textContent = `Position: ${Math.floor(p.x)}, ${Math.floor(p.y)}`;
    
    game.time++;
}

// ============================================================
// RENDER
// ============================================================
function render() {
    const cam = game.camera;
    const ts = TILE_SIZE;
    
    // Sky
    p(ctx, 0, 0, canvas.width, canvas.height, '#87ceeb');
    
    ctx.save();
    ctx.translate(-Math.floor(cam.x), -Math.floor(cam.y));
    
    const startX = Math.max(0, Math.floor(cam.x / ts));
    const startY = Math.max(0, Math.floor(cam.y / ts));
    const endX = Math.min(game.mapWidth, Math.ceil((cam.x + canvas.width) / ts) + 1);
    const endY = Math.min(game.mapHeight, Math.ceil((cam.y + canvas.height) / ts) + 1);
    
    // Collect for depth sorting
    const entities = [];
    
    // Ground
    for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
            const tile = game.map[y][x];
            const px = x * ts;
            const py = y * ts;
            const seed = x * 1000 + y;
            
            drawGrassTile(ctx, px, py, ts, seed);
            
            if (tile !== TILE.GRASS) {
                entities.push({ x: px, y: py, type: tile, seed });
            }
        }
    }
    
    // Sort by Y
    entities.sort((a, b) => a.y - b.y);
    
    // Draw entities
    for (const e of entities) {
        switch (e.type) {
            case TILE.PATH: drawPathTile(ctx, e.x, e.y, ts, e.seed); break;
            case TILE.STONE: drawStoneTile(ctx, e.x, e.y, ts, e.seed); break;
            case TILE.WATER: drawWaterTile(ctx, e.x, e.y, ts, e.seed, game.time); break;
            case TILE.BRIDGE: drawBridgeTile(ctx, e.x, e.y, ts); break;
            case TILE.CHERRY_TREE: drawCherryTree(ctx, e.x, e.y, ts, e.seed); break;
            case TILE.GREEN_TREE: drawGreenTree(ctx, e.x, e.y, ts, e.seed); break;
            case TILE.FENCE: drawFence(ctx, e.x + 8, e.y + 10); break;
            case TILE.LANTERN: drawLantern(ctx, e.x + 10, e.y - 4, game.time); break;
            case TILE.BENCH: drawBench(ctx, e.x + 6, e.y + 10); break;
            case TILE.VENDING: drawVendingMachine(ctx, e.x + 8, e.y - 8); break;
            case TILE.FLOWER: drawFlower(ctx, e.x + 16, e.y + 16, e.seed); break;
        }
    }
    
    // Buildings
    for (const b of game.buildings) {
        drawBuilding(ctx, b.x * ts, b.y * ts, b.w * ts, b.h * ts, b.x * 100 + b.y);
    }
    
    // NPCs
    for (const npc of game.npcs) {
        drawNPC(ctx, npc.x, npc.y, npc.frame, npc.dir, npc.hair, npc.shirt, npc.name);
    }
    
    // Player
    drawCharacter(ctx, game.player.x, game.player.y, game.player.frame, game.player.dir, '#1a1a1a', '#ffffff', 1.3);
    
    ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// ============================================================
// START
// ============================================================
initGame();
gameLoop();
</script>
</body>
